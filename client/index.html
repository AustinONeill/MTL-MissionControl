<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b11" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GardenOps" />
    <title>GardenOps – MTL Cannabis</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('global-error');
        if (!el) { el = document.createElement('pre'); el.id = 'global-error'; el.style.cssText = 'position:fixed;inset:0;z-index:999999;background:#0d0d14;color:#ff4d4d;padding:32px;overflow:auto;font-size:13px;white-space:pre-wrap;font-family:monospace'; document.body.appendChild(el); }
        el.textContent += '[UNCAUGHT] ' + e.message + '\n' + (e.error && e.error.stack ? e.error.stack : 'at ' + e.filename + ':' + e.lineno + ':' + e.colno) + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('global-error');
        if (!el) { el = document.createElement('pre'); el.id = 'global-error'; el.style.cssText = 'position:fixed;inset:0;z-index:999999;background:#0d0d14;color:#ff4d4d;padding:32px;overflow:auto;font-size:13px;white-space:pre-wrap;font-family:monospace'; document.body.appendChild(el); }
        el.textContent += '[UNHANDLED PROMISE] ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '\n\n';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
