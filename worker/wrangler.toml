name = "mtl-missioncontrol-api"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "7c72baecd8d9d5e346b177043c3a95d1"

[[durable_objects.bindings]]
name = "ROOM_DO"
class_name = "RoomDurableObject"

[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ConversationDO"]

# R2 bucket — uncomment after enabling R2 in Cloudflare Dashboard
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "mtl-photos"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "387df7aa35364fb89321f86fa5c82bc5"

# Secrets are set via: wrangler secret put <NAME>
# DATABASE_URL
# STACK_AUTH_JWKS_URL
# STACK_AUTH_PROJECT_ID
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_PUBLIC_BASE_URL
# TEAMS_WEBHOOK_URL
# BOT_FRAMEWORK_APP_ID
# BOT_FRAMEWORK_APP_SECRET
# AZURE_AD_CLIENT_ID
# AZURE_AD_CLIENT_SECRET
# AZURE_AD_TENANT_ID
